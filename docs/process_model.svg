<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 1300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="1300" fill="#f0f4f8"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="80" fill="#1a5276"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="white">VRA File Management System</text>
  <text x="450" y="60" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.8)">Process Model – System Flow Diagram</text>

  <!-- Swimlane headers -->
  <rect x="20" y="95" width="180" height="1180" fill="#d6eaf8" rx="8" opacity="0.7"/>
  <rect x="215" y="95" width="195" height="1180" fill="#d5f5e3" rx="8" opacity="0.7"/>
  <rect x="425" y="95" width="195" height="1180" fill="#fef9e7" rx="8" opacity="0.7"/>
  <rect x="635" y="95" width="245" height="1180" fill="#fdedec" rx="8" opacity="0.7"/>

  <text x="110" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5276">USER</text>
  <text x="312" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">FILE MANAGEMENT</text>
  <text x="522" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#b7770d">NOTIFICATION SYS</text>
  <text x="757" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">REMINDER / DB / BI</text>

  <!-- Helper: node macro -->
  <!-- Process nodes are rectangles; decisions are diamonds -->

  <!-- ─── FLOW 1: File Upload ─────────────────────────────── -->
  <text x="40" y="165" font-size="10" font-weight="bold" fill="#555">① FILE UPLOAD</text>
  <line x1="20" y1="170" x2="880" y2="170" stroke="#aaa" stroke-width="1" stroke-dasharray="4"/>

  <!-- User uploads file -->
  <rect x="30" y="180" width="155" height="44" rx="8" fill="#2e86c1" stroke="#1a5276" stroke-width="2"/>
  <text x="107" y="197" text-anchor="middle" font-size="11" fill="white" font-weight="bold">User Uploads</text>
  <text x="107" y="213" text-anchor="middle" font-size="11" fill="white">File to System</text>

  <!-- Arrow right -->
  <line x1="185" y1="202" x2="225" y2="202" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Validate file -->
  <rect x="225" y="180" width="175" height="44" rx="8" fill="#1e8449" stroke="#155c36" stroke-width="2"/>
  <text x="312" y="197" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Validate File</text>
  <text x="312" y="213" text-anchor="middle" font-size="11" fill="white">(Type, Size)</text>

  <!-- Arrow right -->
  <line x1="400" y1="202" x2="440" y2="202" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Generate UUID / Store -->
  <rect x="440" y="180" width="175" height="44" rx="8" fill="#d68910" stroke="#9a6208" stroke-width="2"/>
  <text x="527" y="197" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Generate File ID</text>
  <text x="527" y="213" text-anchor="middle" font-size="11" fill="white">Store Metadata in DB</text>

  <!-- Arrow right -->
  <line x1="615" y1="202" x2="650" y2="202" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DB + Schedule Reminder -->
  <rect x="650" y="180" width="220" height="44" rx="8" fill="#c0392b" stroke="#922b21" stroke-width="2"/>
  <text x="760" y="197" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Save to PostgreSQL</text>
  <text x="760" y="213" text-anchor="middle" font-size="11" fill="white">Schedule 3-Day Reminder</text>

  <!-- Down arrow from File Management to Notification -->
  <line x1="312" y1="224" x2="312" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Send upload confirmation notification -->
  <rect x="225" y="260" width="175" height="44" rx="8" fill="#1e8449" stroke="#155c36" stroke-width="2"/>
  <text x="312" y="277" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Trigger Upload</text>
  <text x="312" y="293" text-anchor="middle" font-size="11" fill="white">Confirmation Event</text>

  <line x1="400" y1="282" x2="435" y2="282" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="435" y="260" width="175" height="44" rx="8" fill="#d68910" stroke="#9a6208" stroke-width="2"/>
  <text x="522" y="277" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Send Email + SMS</text>
  <text x="522" y="293" text-anchor="middle" font-size="11" fill="white">Confirmation to User</text>

  <line x1="522" y1="260" x2="522" y2="248" stroke="#333" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="522" y1="248" x2="107" y2="248" stroke="#333" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="107" y1="248" x2="107" y2="226" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4"/>
  <text x="310" y="244" text-anchor="middle" font-size="9" fill="#666">Notification delivered to user</text>

  <!-- ─── FLOW 2: File Retrieval ───────────────────────── -->
  <line x1="20" y1="335" x2="880" y2="335" stroke="#aaa" stroke-width="1" stroke-dasharray="4"/>
  <text x="40" y="350" font-size="10" font-weight="bold" fill="#555">② FILE RETRIEVAL</text>

  <!-- User requests file -->
  <rect x="30" y="360" width="155" height="44" rx="8" fill="#2e86c1" stroke="#1a5276" stroke-width="2"/>
  <text x="107" y="377" text-anchor="middle" font-size="11" fill="white" font-weight="bold">User Requests</text>
  <text x="107" y="393" text-anchor="middle" font-size="11" fill="white">a File</text>

  <line x1="185" y1="382" x2="225" y2="382" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Check file exists - DIAMOND decision -->
  <polygon points="312,358 370,382 312,406 254,382" fill="#f0f3f4" stroke="#555" stroke-width="2"/>
  <text x="312" y="378" text-anchor="middle" font-size="10" fill="#333">File</text>
  <text x="312" y="392" text-anchor="middle" font-size="10" fill="#333">Exists?</text>

  <!-- No branch -->
  <line x1="312" y1="406" x2="312" y2="430" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="245" y="430" width="135" height="36" rx="6" fill="#c0392b" stroke="#922b21" stroke-width="1.5"/>
  <text x="312" y="443" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Return 404</text>
  <text x="312" y="457" text-anchor="middle" font-size="10" fill="white">File Not Found</text>
  <text x="372" y="420" font-size="9" fill="#c0392b">No</text>

  <!-- Yes branch -->
  <line x1="370" y1="382" x2="435" y2="382" stroke="#1e8449" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="430" y="376" font-size="9" fill="#1e8449">Yes</text>

  <rect x="435" y="360" width="175" height="44" rx="8" fill="#d68910" stroke="#9a6208" stroke-width="2"/>
  <text x="522" y="377" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Serve File</text>
  <text x="522" y="393" text-anchor="middle" font-size="11" fill="white">to User (Download)</text>

  <!-- Log retrieval + update status -->
  <line x1="610" y1="382" x2="650" y2="382" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="650" y="360" width="220" height="44" rx="8" fill="#c0392b" stroke="#922b21" stroke-width="2"/>
  <text x="760" y="377" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Log Retrieval in DB</text>
  <text x="760" y="393" text-anchor="middle" font-size="11" fill="white">Update Status → Retrieved</text>

  <!-- Trigger retrieval notification -->
  <line x1="522" y1="404" x2="522" y2="430" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="435" y="430" width="175" height="44" rx="8" fill="#d68910" stroke="#9a6208" stroke-width="2"/>
  <text x="522" y="447" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Send Retrieval</text>
  <text x="522" y="463" text-anchor="middle" font-size="11" fill="white">Notification (Email/SMS)</text>

  <!-- ─── FLOW 3: Reminder ─────────────────────────────── -->
  <line x1="20" y1="510" x2="880" y2="510" stroke="#aaa" stroke-width="1" stroke-dasharray="4"/>
  <text x="40" y="525" font-size="10" font-weight="bold" fill="#555">③ REMINDER (3-DAY)</text>

  <rect x="650" y="535" width="220" height="44" rx="8" fill="#c0392b" stroke="#922b21" stroke-width="2"/>
  <text x="760" y="552" text-anchor="middle" font-size="11" fill="white" font-weight="bold">APScheduler Fires</text>
  <text x="760" y="568" text-anchor="middle" font-size="11" fill="white">3-Day Reminder Job</text>

  <line x1="650" y1="557" x2="612" y2="557" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Check if retrieved -->
  <polygon points="522,533 583,557 522,581 461,557" fill="#f0f3f4" stroke="#555" stroke-width="2"/>
  <text x="522" y="553" text-anchor="middle" font-size="10" fill="#333">Already</text>
  <text x="522" y="567" text-anchor="middle" font-size="10" fill="#333">Retrieved?</text>

  <!-- Yes - skip -->
  <line x1="522" y1="533" x2="522" y2="520" stroke="#1e8449" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="455" y="500" width="135" height="30" rx="6" fill="#eee" stroke="#aaa"/>
  <text x="522" y="514" text-anchor="middle" font-size="10" fill="#555">Mark Skipped</text>
  <text x="593" y="526" font-size="9" fill="#1e8449">Yes</text>

  <!-- No - send reminder -->
  <line x1="461" y1="557" x2="412" y2="557" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="450" y="550" font-size="9" fill="#c0392b">No</text>

  <rect x="225" y="535" width="175" height="44" rx="8" fill="#1e8449" stroke="#155c36" stroke-width="2"/>
  <text x="312" y="552" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Trigger Notification</text>
  <text x="312" y="568" text-anchor="middle" font-size="11" fill="white">Service → Reminder</text>

  <line x1="225" y1="557" x2="200" y2="557" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="30" y="535" width="155" height="44" rx="8" fill="#2e86c1" stroke="#1a5276" stroke-width="2"/>
  <text x="107" y="552" text-anchor="middle" font-size="11" fill="white" font-weight="bold">User Receives</text>
  <text x="107" y="568" text-anchor="middle" font-size="11" fill="white">Reminder Email/SMS</text>

  <!-- ─── FLOW 4: Power BI ─────────────────────────────── -->
  <line x1="20" y1="620" x2="880" y2="620" stroke="#aaa" stroke-width="1" stroke-dasharray="4"/>
  <text x="40" y="635" font-size="10" font-weight="bold" fill="#555">④ POWER BI REPORTING</text>

  <rect x="650" y="645" width="220" height="44" rx="8" fill="#c0392b" stroke="#922b21" stroke-width="2"/>
  <text x="760" y="662" text-anchor="middle" font-size="11" fill="white" font-weight="bold">PostgreSQL Data</text>
  <text x="760" y="678" text-anchor="middle" font-size="11" fill="white">Synced to Power BI</text>

  <line x1="650" y1="667" x2="612" y2="667" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="435" y="645" width="175" height="44" rx="8" fill="#d68910" stroke="#9a6208" stroke-width="2"/>
  <text x="522" y="662" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Power BI Refreshes</text>
  <text x="522" y="678" text-anchor="middle" font-size="11" fill="white">Dataset Automatically</text>

  <line x1="435" y1="667" x2="403" y2="667" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="225" y="645" width="175" height="44" rx="8" fill="#1e8449" stroke="#155c36" stroke-width="2"/>
  <text x="312" y="662" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Django Generates</text>
  <text x="312" y="678" text-anchor="middle" font-size="11" fill="white">Embed Token via API</text>

  <line x1="225" y1="667" x2="195" y2="667" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="30" y="645" width="155" height="44" rx="8" fill="#2e86c1" stroke="#1a5276" stroke-width="2"/>
  <text x="107" y="662" text-anchor="middle" font-size="11" fill="white" font-weight="bold">User Views</text>
  <text x="107" y="678" text-anchor="middle" font-size="11" fill="white">Embedded Dashboard</text>

  <!-- ─── LEGEND ────────────────────────────────────────── -->
  <rect x="20" y="730" width="860" height="180" rx="10" fill="white" stroke="#ddd"/>
  <text x="450" y="755" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Legend</text>

  <rect x="60" y="770" width="100" height="30" rx="6" fill="#2e86c1"/>
  <text x="110" y="789" text-anchor="middle" font-size="10" fill="white" font-weight="bold">User Action</text>

  <rect x="200" y="770" width="100" height="30" rx="6" fill="#1e8449"/>
  <text x="250" y="789" text-anchor="middle" font-size="10" fill="white" font-weight="bold">File Management</text>

  <rect x="340" y="770" width="100" height="30" rx="6" fill="#d68910"/>
  <text x="390" y="789" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Notification Sys</text>

  <rect x="480" y="770" width="100" height="30" rx="6" fill="#c0392b"/>
  <text x="530" y="789" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Reminder/DB/BI</text>

  <polygon points="650,770 720,785 650,800 580,785" fill="#f0f3f4" stroke="#555"/>
  <text x="650" y="789" text-anchor="middle" font-size="10" fill="#333">Decision</text>

  <line x1="760" y1="785" x2="840" y2="785" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="800" y="778" text-anchor="middle" font-size="9" fill="#555">Control Flow</text>
  <line x1="760" y1="810" x2="840" y2="810" stroke="#333" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="800" y="803" text-anchor="middle" font-size="9" fill="#555">Return/Async</text>

  <!-- Swimlane label row -->
  <rect x="20" y="935" width="860" height="50" rx="8" fill="#1a5276"/>
  <text x="450" y="965" text-anchor="middle" font-size="14" font-weight="bold" fill="white">
    Volta River Authority — VRA File Management System Process Model
  </text>
  <text x="450" y="982" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">Swimlane BPMN-style Flow Diagram</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1e8449"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
  </defs>

</svg>
